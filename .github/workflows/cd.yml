name: CD - Frontend

on:
  workflow_run:
    workflows: ["CI - Frontend"]
    types:
      - completed
    branches: [main]

jobs:
  frontend-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}  # CI 성공 시에만 실행

    steps:
      # CI에서 빌드한 dist 아티팩트 다운로드 (main 브랜치에서 방금 성공한 CI run의 결과물 사용)
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # S3 업로드용 AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # S3 버킷의 /dist 경로에 정적 파일 동기화
      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_FE }}/dist/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_FE }}/dist/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "index.html" \
            --include "*.html"

      # CloudFront 캐시 무효화로 즉시 새 버전 전파
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Send Discord Notification
        if: failure()
        run: |
          MSG="🔴 CD - Frontend 실패! (Prod)"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"${MSG}\n🔗 [로그 확인](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}