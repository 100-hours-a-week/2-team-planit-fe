name: Rollback - Frontend

on:
  workflow_dispatch:  # Actions 탭에서 수동 실행

jobs:
  frontend-rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 마지막으로 성공한 CI 빌드의 run ID 조회 (해당 아티팩트로 롤백)
      - name: Find CI ID
        id: find_run
        run: |
          RUN_ID=$(gh run list --workflow "CI - Frontend" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "성공한 CI ID를 찾을 수 없습니다."
            exit 1
          fi
          
          echo "target_id=$RUN_ID" >> $GITHUB_OUTPUT
          
          # run_url도 함께 저장 (Discord 알림용)
          RUN_URL=$(gh run view $RUN_ID --json url --jq '.url')
          echo "run_url=$RUN_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 조회한 CI run의 frontend-dist 아티팩트 다운로드
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
          run-id: ${{ steps.find_run.outputs.target_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # S3 업로드용 AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # S3에 이전 빌드 파일 동기화 (배포와 동일한 캐시 정책 적용)
      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_FE }}/dist/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET_FE }}/dist/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "index.html" \
            --include "*.html"

      # CloudFront 캐시 무효화로 롤백된 버전 즉시 반영
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
            --paths "/*"

      # 성공/실패 여부와 관계없이 Discord 알림 전송
      - name: Send Discord Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          CI_RUN_URL="${{ steps.find_run.outputs.run_url }}"
          if [ "$STATUS" = "success" ]; then
            MSG="Rollback - Frontend 성공\n 롤백 소스 CI: [링크](${CI_RUN_URL})"
          else
            MSG="🔴 Rollback - Frontend 실패"
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"${MSG}\n🔗 [로그 확인](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
